version: '3.8'

services:
  mongodb:
    image: mongodb/mongodb-atlas-local:8.0
    container_name: fisiodesk-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: fisiodesk
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
      - mongodb_mongot:/data/mongot
    networks:
      - fisiodesk-network

  # Container che importa i dati automaticamente
  mongodb-seed:
    image: mongodb/mongodb-atlas-local:8.0
    container_name: fisiodesk-mongodb-seed
    volumes:
      - ./data:/data
    command: >
      bash -c "
        sleep 5 &&
        mongoimport --host mongodb --db fisiodesk --collection pazienti --file /data/pazienti.json --jsonArray &&
        mongoimport --host mongodb --db fisiodesk --collection schede_valutazione --file /data/schede_valutazione.json --jsonArray &&
        mongoimport --host mongodb --db fisiodesk --collection diario_trattamenti --file /data/diario_trattamenti.json --jsonArray &&
        mongoimport --host mongodb --db fisiodesk --collection eventi_calendario --file /data/eventi_calendario.json --jsonArray &&
        echo 'Dati importati con successo! ✅'
      "
    depends_on:
      - mongodb
    networks:
      - fisiodesk-network

  # Optional: MongoDB Express per visualizzare i dati (UI su http://localhost:8081)
  mongo-express:
    image: mongo-express:latest
    container_name: fisiodesk-mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017/
      ME_CONFIG_BASICAUTH: false
    depends_on:
      - mongodb
    networks:
      - fisiodesk-network

volumes:
  mongodb_data:
  mongodb_config:
  mongodb_mongot:

networks:
  fisiodesk-network:
    driver: bridge