version: '3.8'

services:
  mongodb:
    image: mongodb/mongodb-atlas-local:8.0
    container_name: fisiodesk-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: fisiodesk
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
      - mongodb_mongot:/data/mongot
    networks:
      - fisiodesk-network
    restart: unless-stopped

  mongo-express:
    image: mongo-express:latest
    container_name: fisiodesk-mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017/
      ME_CONFIG_BASICAUTH: false
    depends_on:
      - mongodb
    networks:
      - fisiodesk-network
    restart: unless-stopped

volumes:
  mongodb_data:
  mongodb_config:
  mongodb_mongot:

networks:
  fisiodesk-network:
    driver: bridge
